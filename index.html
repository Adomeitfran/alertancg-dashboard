<!DOCTYPE html>
<html lang="pt-BR" class="staticrypt-html">
<head>
<meta charset="utf-8" />
<title>CX Data Hub - Acesso Restrito</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<meta http-equiv="cache-control" content="max-age=0" />
<meta http-equiv="cache-control" content="no-cache" />
<meta http-equiv="expires" content="0" />
<meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
<meta http-equiv="pragma" content="no-cache" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg0:#0a0f1a;
  --t1:#f3f4f6; --t2:#9ca3af; --tm:#6b7280;
  --ab:#3b82f6; --ac:#10b981; --ap:#8b5cf6; --apk:#ec4899;
  --bc:rgba(255,255,255,0.08);
}
* { margin:0; padding:0; box-sizing:border-box; }
.staticrypt-html, .staticrypt-body { height:100%; }
.staticrypt-body {
  font-family:'Inter',sans-serif;
  background:var(--bg0);
  color:var(--t1);
  overflow-x:hidden;
  position:relative;
  min-height:100vh;
}
.staticrypt-body::before, .staticrypt-body::after {
  content:''; position:fixed; border-radius:50%; filter:blur(120px); opacity:.35; z-index:0;
  animation:float 18s ease-in-out infinite;
}
.staticrypt-body::before { width:520px; height:520px; background:radial-gradient(circle, var(--ab), transparent 70%); top:-120px; left:-120px; }
.staticrypt-body::after  { width:620px; height:620px; background:radial-gradient(circle, var(--ap), transparent 70%); bottom:-150px; right:-150px; animation-delay:-9s; }
@keyframes float {
  0%,100% { transform:translate(0,0) scale(1); }
  50%     { transform:translate(40px,-30px) scale(1.1); }
}
@keyframes gradFloat {
  0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%}
}
.grad-val {
  background:linear-gradient(90deg,var(--ab),var(--ac),var(--ap),var(--apk),var(--ab));
  background-size:300% 300%;
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  animation:gradFloat 5s ease infinite;
}

.staticrypt-content {
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  position:relative;
  z-index:1;
}

.staticrypt-page {
  width:100%;
  max-width:420px;
}

.staticrypt-form {
  background:rgba(17,24,39,0.55);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border:1px solid var(--bc);
  border-radius:18px;
  padding:36px 32px;
  box-shadow:0 16px 48px rgba(0,0,0,.45);
  position:relative;
  overflow:hidden;
}
.staticrypt-form::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background:linear-gradient(90deg,var(--ab),var(--ac),var(--ap));
}

.brand {
  text-align:center;
  font-size:28px;
  font-weight:800;
  letter-spacing:-0.5px;
  margin-bottom:4px;
}
.tagline {
  text-align:center;
  font-size:10px;
  color:var(--tm);
  text-transform:uppercase;
  letter-spacing:2.5px;
  margin-bottom:28px;
}

.staticrypt-instructions { text-align:center; margin-bottom:24px; }
.staticrypt-title {
  font-size:16px;
  font-weight:700;
  color:var(--t1);
  margin-bottom:6px;
}
.staticrypt-instructions p:not(.staticrypt-title) {
  font-size:12px;
  color:var(--t2);
  line-height:1.55;
}

.staticrypt-hr {
  display:none;
}

.staticrypt-password-container {
  position:relative;
  background:rgba(0,0,0,0.3);
  border:1px solid var(--bc);
  border-radius:10px;
  margin-bottom:14px;
  transition:border-color .2s ease, background .2s ease;
}
.staticrypt-password-container:focus-within {
  border-color:rgba(59,130,246,.5);
  background:rgba(0,0,0,0.4);
}
.staticrypt-form input[type="password"],
.staticrypt-form input[type="text"] {
  background:transparent;
  border:0;
  color:var(--t1);
  font-family:inherit;
  font-size:14px;
  outline:0;
  padding:14px 44px 14px 16px;
  width:100%;
  letter-spacing:0.5px;
}
.staticrypt-form input[type="password"]::placeholder,
.staticrypt-form input[type="text"]::placeholder {
  color:var(--tm);
  letter-spacing:normal;
}

.staticrypt-toggle-password-visibility {
  cursor:pointer;
  width:18px;
  height:18px;
  padding:13px;
  position:absolute;
  right:4px;
  top:50%;
  transform:translateY(-50%);
  opacity:.55;
  filter:invert(1);
  transition:opacity .2s ease;
}
.staticrypt-toggle-password-visibility:hover { opacity:.9; }

label.staticrypt-remember {
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:18px;
  font-size:12px;
  color:var(--t2);
  cursor:pointer;
  user-select:none;
}
.staticrypt-remember input[type="checkbox"] {
  width:16px;
  height:16px;
  accent-color:var(--ab);
  cursor:pointer;
}

.staticrypt-form .staticrypt-decrypt-button {
  width:100%;
  padding:14px;
  background:linear-gradient(135deg,var(--ab),var(--ap));
  color:#fff;
  border:0;
  border-radius:10px;
  font-family:inherit;
  font-size:13px;
  font-weight:700;
  letter-spacing:1.5px;
  text-transform:uppercase;
  cursor:pointer;
  transition:transform .15s ease, box-shadow .2s ease, filter .2s ease;
  box-shadow:0 6px 18px rgba(59,130,246,.25);
}
.staticrypt-form .staticrypt-decrypt-button:hover {
  transform:translateY(-1px);
  box-shadow:0 10px 24px rgba(139,92,246,.35);
  filter:brightness(1.08);
}
.staticrypt-form .staticrypt-decrypt-button:active {
  transform:translateY(0);
  filter:brightness(.95);
}

.footer-note {
  text-align:center;
  font-size:10px;
  color:var(--tm);
  margin-top:22px;
  letter-spacing:.5px;
}
.footer-note a {
  color:var(--t2);
  text-decoration:none;
  border-bottom:1px dashed var(--bc);
}
.footer-note a:hover { color:var(--t1); }

.hidden { display:none !important; }

.staticrypt-spinner-container {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
.staticrypt-spinner {
  display:inline-block;
  width:2.5rem;
  height:2.5rem;
  border:3px solid rgba(255,255,255,.1);
  border-right-color:var(--ab);
  border-radius:50%;
  animation:spinner-border .75s linear infinite;
}
@keyframes spinner-border {
  100% { transform:rotate(360deg); }
}

@media (max-width:480px) {
  .staticrypt-form { padding:28px 22px; }
  .brand { font-size:24px; }
}
</style>
</head>
